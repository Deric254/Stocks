name: Release

# Runs on every push to main. Bumps the patch version automatically,
# builds a self-contained executable (frontend bundled inside — no
# separate Node server needed to run it), and publishes a GitHub
# Release with that executable attached. Other systems can then poll
# GET /api/version/check (see app.py) to discover and download it.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        run: |
          set -e
          CURRENT=$(cat VERSION 2>/dev/null || echo "0.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          BUMP_TYPE="${{ github.event.inputs.bump || 'patch' }}"

          if [ "$BUMP_TYPE" = "major" ]; then
            MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0
          elif [ "$BUMP_TYPE" = "minor" ]; then
            MINOR=$((MINOR+1)); PATCH=0
          else
            PATCH=$((PATCH+1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          # 🌟 MINIMAL FIX: Check if the newly calculated tag already exists on GitHub
          if git ls-remote --tags origin "refs/tags/v$NEW_VERSION" | grep -q "refs/tags/v$NEW_VERSION"; then
            echo "::error::Cannot release! Tag v$NEW_VERSION already exists on GitHub. Please update your local VERSION file first."
            exit 1
          fi

          echo "$NEW_VERSION" > VERSION
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT -> $NEW_VERSION"


      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin main
          git push origin "${{ steps.bump.outputs.tag }}"

  build:
    needs: bump-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: stockintel-windows.exe
            build_name: stockintel
          - os: ubuntu-latest
            artifact_name: stockintel-linux
            build_name: stockintel
          - os: macos-latest
            artifact_name: stockintel-macos
            build_name: stockintel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # pick up the version-bump commit from the previous job

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend build into backend bundle location
        shell: bash
        run: |
          mkdir -p backend/frontend
          cp -r frontend/dist backend/frontend/dist

      - name: Install backend dependencies + PyInstaller
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Copy VERSION into backend bundle location
        shell: bash
        run: cp VERSION backend/VERSION

      - name: Build executable with PyInstaller
        working-directory: backend
        shell: bash
        run: |
          pyinstaller --onefile --name "${{ matrix.build_name }}" \
            --add-data "frontend/dist${{ runner.os == 'Windows' && ';' || ':' }}frontend/dist" \
            --add-data "VERSION${{ runner.os == 'Windows' && ';' || ':' }}." \
            --add-data "data${{ runner.os == 'Windows' && ';' || ':' }}data" \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            app.py

      - name: Rename artifact per-platform
        shell: bash
        run: |
          cd backend/dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv "${{ matrix.build_name }}.exe" "${{ matrix.artifact_name }}"
          else
            mv "${{ matrix.build_name }}" "${{ matrix.artifact_name }}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: backend/dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    needs: [bump-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact directories
        run: |
          mkdir -p release_files
          find artifacts -type f -exec cp {} release_files/ \;
          ls -la release_files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.tag }}
          name: "Stock Intel ${{ needs.bump-version.outputs.tag }}"
          generate_release_notes: true
          files: release_files/*
          body: |
            ## Stock Intel ${{ needs.bump-version.outputs.tag }}

            Automated release. Download the executable for your platform below —
            it bundles the backend API and frontend into a single file; no
            separate Python/Node install needed to run it.

            **Windows:** `stockintel-windows.exe` — double-click to run, opens on http://localhost:8000
            **Linux:** `stockintel-linux` — `chmod +x` then run
            **macOS:** `stockintel-macos` — `chmod +x` then run

            Client systems can check for updates programmatically via:
            `GET /api/version/check` (requires `GITHUB_REPO` env var set to this repo)
